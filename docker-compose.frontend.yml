# docker-compose.yml — Frontend Chronus
#
# Adicione este serviço ao docker-compose.yml do backend
# OU use este arquivo separado com:
#   docker-compose -f docker-compose.yml -f ../chronus-frontend/docker-compose.yml up -d
#
# O serviço "chronus-frontend" entra na mesma rede "chronus_network" do backend,
# o que permite ao nginx resolver "chronus-api:8081" internamente.

services:
  chronus-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chronus-frontend
    ports:
      - "3000:80"        # acesso: http://localhost:3000
    # depends_on:
    #   - chronus-api      # opcional (dependência da API)
    networks:
      - chronus_network
    restart: unless-stopped

# Referência à rede externa criada pelo docker-compose do backend.
networks:
  chronus_network:
    external: true